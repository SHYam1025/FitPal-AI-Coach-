<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPal AI Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #9ca3af; border-radius: 20px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white w-full max-w-2xl h-full md:h-[90vh] md:max-h-[700px] rounded-lg shadow-xl flex flex-col">
        <div class="bg-gray-800 text-white p-4 rounded-t-lg flex items-center">
            <svg class="w-8 h-8 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <h1 class="text-xl font-semibold">FitPal AI Coach</h1>
        </div>

        <div id="chat-container" class="flex-1 p-6 space-y-4 overflow-y-auto chat-container">
            <!-- Chat messages will be appended here -->
        </div>

        <div id="loading-indicator" class="hidden p-4 text-center">
            <div class="flex items-center justify-center space-x-2">
                <div class="w-3 h-3 bg-gray-500 rounded-full animate-pulse"></div>
                <div class="w-3 h-3 bg-gray-500 rounded-full animate-pulse" style="animation-delay: 0.2s;"></div>
                <div class="w-3 h-3 bg-gray-500 rounded-full animate-pulse" style="animation-delay: 0.4s;"></div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-200">
            <form id="chat-form" class="flex items-center space-x-3">
                <input type="text" id="message-input" placeholder="Ask FitPal..." class="flex-1 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-gray-500 transition" autocomplete="off">
                <label for="file-upload" class="cursor-pointer">
                    <svg class="w-6 h-6 text-gray-500 hover:text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    <input id="file-upload" type="file" class="hidden">
                </label>
                <button type="submit" class="bg-gray-800 text-white px-5 py-2 rounded-full hover:bg-gray-700 transition font-semibold focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-800">Send</button>
            </form>
            <p id="file-name" class="text-xs text-gray-500 mt-2 ml-2"></p>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const fileUpload = document.getElementById('file-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const loadingIndicator = document.getElementById('loading-indicator');

        let chatHistory = [];
        let attachedFile = null;

        function displayMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const contentDiv = document.createElement('div');
            // Ensure text is not null or undefined
            const messageText = text || "Sorry, I received an empty response.";
            contentDiv.className = `max-w-md p-3 rounded-lg ${role === 'user' ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-800'}`;
            contentDiv.innerText = messageText;

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Initial welcome message
        document.addEventListener('DOMContentLoaded', () => {
            const welcomeText = "Hello! I'm FitPal. To get started, tell me a bit about your day. What have you eaten? How much sleep did you get?";
            chatHistory.push({ role: 'assistant', content: welcomeText });
            displayMessage('assistant', welcomeText);
        });

        fileUpload.addEventListener('change', () => {
            if (fileUpload.files.length > 0) {
                attachedFile = fileUpload.files[0];
                fileNameDisplay.textContent = `Attached: ${attachedFile.name}`;
            }
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userMessage = messageInput.value.trim();
            if (!userMessage && !attachedFile) return;

            displayMessage('user', userMessage || `Uploaded: ${attachedFile.name}`);
            chatHistory.push({ role: 'user', content: userMessage });
            messageInput.value = '';
            loadingIndicator.classList.remove('hidden');

            const formData = new FormData();
            formData.append('history', JSON.stringify(chatHistory));
            formData.append('message', userMessage);
            if (attachedFile) {
                formData.append('file', attachedFile);
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/chat', {
                    method: 'POST',
                    body: formData,
                });
                
                const data = await response.json();

                // --- THIS IS THE FIX ---
                // We directly access data.response, which is a string.
                const aiResponse = data.response; 
                // -----------------------
                
                chatHistory.push({ role: 'assistant', content: aiResponse });
                displayMessage('assistant', aiResponse);

            } catch (error) {
                console.error("Fetch Error:", error);
                displayMessage('assistant', 'Sorry, I seem to be having trouble connecting. Please check the server and try again.');
            } finally {
                loadingIndicator.classList.add('hidden');
                attachedFile = null;
                fileUpload.value = null;
                fileNameDisplay.textContent = '';
            }
        });
    </script>
</body>
</html>
